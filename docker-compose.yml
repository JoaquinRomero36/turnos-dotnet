version: '3.9'

services:

  # ── PostgreSQL 15 ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: turnos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: turnos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Argentina/Cordoba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d turnos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── .NET 9 Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: turnos_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=turnos_db;Username=postgres;Password=postgres"
      Jwt__Secret: "TurnosCentroSalud_SuperSecretKey_2026_MustBe32CharsMin!!"
      Jwt__Issuer: "TurnosApi"
      Jwt__Audience: "TurnosFrontend"
      Jwt__ExpirationHours: "8"
      Cors__AllowedOrigin: "http://localhost:4200"
      ASPNETCORE_ENVIRONMENT: Production
      TZ: America/Argentina/Cordoba
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/swagger/index.html || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
